<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>随机点名系统</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div class="container">
    <h1>随机点名系统</h1>
    <input type="text" id="nameInput" placeholder="输入名字">

    <button id="addButton">添加</button>
    <button id="removeButton">移除</button>

    <div id="result"></div>

    <ul id="nameList"></ul>
</div>

<script src="./js/scripts.js"></script>

</body>
</html>
